<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
</head>
<body>
    <h1>Cart quantity</h1>
    <button onclick="
      console.log(`cartQuantity: ${cartQuantity}`);
    
    ">Show quantity</button>
    <button onclick="
     cartQuantity += 1;
     console.log(`cartQuantity : ${cartQuantity}`);
     ">Add to cart</button>
    <button onclick="
    cartQuantity += 2;
    console.log(`cartQuantity : ${cartQuantity}`);
    ">+2</button>
    <button onclick="
    cartQuantity +=3;
    console.log(`cartQuantity : ${cartQuantity}`);
    ">+3</button>
    <button onclick="
    cartQuantity += 4;
    console.log(`cartQuantity : ${cartQuantity}`);
    ">+4</button>
    <button onclick="
    cartQuantity += 5;
    console.log(`cartQuantity : ${cartQuantity}`);
    ">+5</button>
    <button onclick="
    cartQuantity -= 1;
    console.log(`cartQuantity : ${cartQuantity}`);
    ">Remove from cart</button>
    <button onclick="
    cartQuantity = 0;
    console.log('Cart was Reset');
    console.log(`cartQuantity : ${cartQuantity}`);
    ">Reset Cart</button>

    <script>
        let cartQuantity = 0;

    </script>
</body>
