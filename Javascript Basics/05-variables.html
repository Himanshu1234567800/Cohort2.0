<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variables</title>
</head>
<body>
    <script>
        let variable1=3;
        console.log(variable1);

        const calculation = 2+2;
        console.log(calculation+2);

        const message = 'hello';
        console.log(message);

        variable1 = 5;
        console.log(variable1);

        variable1 = variable1+2;
        console.log(variable1)

        const yes = 4;
        console.log(yes);

    </script>
</body>
</html>
